name: fullchain
runtime: go
config:
  cold-extract:
    type: boolean
    description: 'If set to true, turns on OpenTelemetry cold extract in files. This will export the 3 signals PersistentVolumeClaims in which data is stored.'
    default: false
  registry:
    type: string
    description: 'An optional OCI registry to download Docker images from.'
    default: ""
  with-inside-registry:
    type: boolean
    description: 'Either to deploy an OCI registry for scenarios within the Kubernetes cluster.'
    default: false
  registry-clusterip:
    type: string
    description: 'Hardcode the cluster ip for the registry''s cluster IP. Use to integrate a usable OCI registry, and in conjunction of `with-inside-registry`.'
    default: ""
  chall-kube-config:
    type: string
    secret: true
    description: A kubeconfig to use rather than the default ServiceAccount.
    default: ""
  chall-manager-replicas:
    type: integer
    description: 'The number of replicas for Chall-Manager. Defaults to 1.'
    default: 1.0
  etcd-replicas:
    type: integer
    description: 'The number of replicas for the etcd cluster used by Chall-Manager. Defaults to 1.'
    default: 1.0
  ctfd-replicas:
    type: integer
    description: 'The number of replicas of CTFd. Defaults to 1.'
    default: 1.0
  ctfd-workers:
    type: integer
    description: 'The number of workers of CTFd per replicas. Defaults to 1.'
    default: 1.0
  image:
    type: string
    description: 'The CTFd image to use. Defaults to CTFer.io''s image.'
    default: 'ctferio/ctfd:latest'
  crt:
    type: string
    secret: true
    description: Content of the .crt x509 certificate pair
  key:
    type: string
    secret: true
    description: Content of the .key x509 certificate pair
  hostname:
    type: string
    description: The URL to use for CTFd
  expose:
    type: boolean
    description: 'If set to true, exposes CTFd through a NodePort. Do not use in production, prefer using DNS and an Ingress Controller.'
    default: false
  storage-class-name:
    type: string
    description: 'The StorageClassName for the PersistenVolumeClaim.'
    default: ''

author: CTFer.io
license: Apache-2.0
website: https://github.com/ctfer-io/fullchain
