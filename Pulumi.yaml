name: fullchain
runtime: go
config:
  # Monitoring
  monitoring.storage-class-name:
    type: string
    default: ''
  monitoring.storage-size:
    type: string
    default: '10Gi'
  monitoring.pvc-access-modes:
    type: array
    items:
      type: string
    default: [ 'ReadWriteMany' ]
  monitoring.cold-extract:
    type: boolean
    default: false
  
  # ChallManager
  chall-manager.tag:
    type: string
    default: 'latest'
  chall-manager.log-level:
    type: string
    default: info
  chall-manager.etcd-replicas:
    type: integer
    default: 1
  chall-manager.replicas:
    type: integer
    default: 1
  chall-manager.janitor-cron:
    type: string
    default: '*/1 * * * *'
  chall-manager.janitor-ticker:
    type: string
    default: 1m
  chall-manager.janitor-mode:
    type: string
    default: ticker
  chall-manager.pvc-access-modes:
    type: array
    items:
      type: string
    default: [ 'ReadWriteMany' ]
  chall-manager.pvc-storage-size:
    type: string
    default: '10Gi'
  chall-manager.kubeconfig:
    type: string
    default: '' # won't load any
  chall-manager.requests:
    default: {}
  chall-manager.limits:
    default: {}
  chall-manager.envs:
    default: {}
  chall-manager.swagger:
    type: boolean
    default: false
  chall-manager.oci-insecure:
    type: boolean
    default: false

  # CTFer > Platform
  ctfer.platform.image:
    type: string
    default: 'ctferio/ctfd:latest'
  ctfer.platform.crt:
    type: string
    default: ''
  ctfer.platform.key:
    type: string
    default: ''
  ctfer.platform.storage-size:
    type: string
    default: '10Gi'
  ctfer.platform.workers:
    type: integer
    default: 3 # assume 1 CPU core at least, so 2*1+1=3 (from https://docs.gunicorn.org/en/latest/design.html#how-many-workers)
  ctfer.platform.replicas:
    type: integer
    default: 1
  ctfer.platform.requests:
    default: {}
  ctfer.platform.limits:
    default: {}
  ctfer.platform.storage-class:
    type : string
    default: ''
  ctfer.platform.pvc-access-modes:
    type: array
    items:
      type: string
    default: [ 'ReadWriteMany' ]
  ctfer.platform.hostname:
    type: string
    default: 'localhost'
  ctfer.platform.ingress-annotations:
    default: {}

  # CTFer > DB
  ctfer.db.storage-class-name:
    type: string
    default: ''
  ctfer.db.operator-namespace:
    type: string
    default: ''
  ctfer.db.replicas:
    type: integer
    default: 1

  # CTFer > Cache
  ctfer.cache.replicas:
    type: integer
    default: 1
  
  # CTFer
  ctfer.expose:
    type: boolean
    default: false

  # OCI
  oci.username:
    type: string
    default: ''
  oci.password:
    type: string
    default: ''
  oci.with-inside-registry:
    type: boolean
    default: false
  oci.cluster-ip:
    type: string
    default: ''
  oci.pvc-storage-size:
    type: string
    default: '10Gi'

author: CTFer.io
license: Apache-2.0
website: https://github.com/ctfer-io/fullchain
